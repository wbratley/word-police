name: Build & Release APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK platform & build tools
        run: sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Generate Gradle wrapper
        run: gradle wrapper --gradle-version 8.6 --distribution-type bin

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Compute version tag
        id: ver
        run: echo "tag=v$(date +'%Y.%m.%d')-${{ github.run_number }}" >> "$GITHUB_OUTPUT"

      - name: Rename APK
        run: |
          mv app/build/outputs/apk/debug/app-debug.apk \
             app/build/outputs/apk/debug/word-police-${{ steps.ver.outputs.tag }}.apk

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: "Word Police ${{ steps.ver.outputs.tag }}"
          body: |
            ## Word Police – Phonics Game

            📱 Download and install the APK on your Android device.

            **What's in this build:**
            - 5 rounds of Year 1 common exception words
            - UK English TTS voice
            - Police siren sound effects
            - 3 wrong answers = criminals escape; 5 correct = caught!

            **Obtainium users:** add `https://github.com/${{ github.repository }}` and it will auto-update.
          files: app/build/outputs/apk/debug/word-police-*.apk
          make_latest: true
